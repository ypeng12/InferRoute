<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InferRoute & Quant.ai Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', -apple-system, sans-serif; }
        body { background: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .nav-bar {
            height: 52px;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: #38bdf8;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            background: #1e293b;
            padding: 3px;
            border-radius: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover {
            color: #f8fafc;
        }

        .tab-btn.active {
            background: #2563eb;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="brand">
            <span>🚀 InferRoute & Quant.ai Hub</span>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('platform')">
                <span>🌐</span> InferRoute LLM Gateway
            </button>
            <button class="tab-btn" onclick="switchTab('quant')">
                <span>📈</span> Quant.ai Trading Terminal
            </button>
        </div>
    </div>

    <iframe id="mainFrame" class="content-frame" src="platform.html"></iframe>

    <script>
        function switchTab(tab) {
            const frame = document.getElementById('mainFrame');
            const btns = document.querySelectorAll('.tab-btn');
            
            btns.forEach(btn => btn.classList.remove('active'));

            if (tab === 'platform') {
                frame.src = 'platform.html';
                btns[0].classList.add('active');
            } else {
                frame.src = 'quant.html';
                btns[1].classList.add('active');
            }
        }
    </script>
</body>
</html>
