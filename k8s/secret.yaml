apiVersion: v1
kind: Secret
metadata:
  name: inferroute-secrets
  namespace: inferroute
  labels:
    app.kubernetes.io/name: inferroute
type: Opaque
# IMPORTANT: Replace placeholder values with base64-encoded real secrets:
#   echo -n "your-actual-key" | base64
stringData:
  OPENAI_API_KEY: "YOUR_OPENAI_API_KEY_HERE"
  GEMINI_API_KEY: "YOUR_GEMINI_API_KEY_HERE"
  ADMIN_API_KEY: "YOUR_ADMIN_KEY_HERE"
  POSTGRES_PASSWORD: "postgres"
